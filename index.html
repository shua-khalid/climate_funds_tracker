<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Climate Funds Tracker  -  GIZ ASP Programme</title>
<style>
  :root {
    --bg-page: #F7F6F2;
    --bg-card: #FFFFFF;
    --bg-secondary: #F1EFE8;
    --text-primary: #1A1A18;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --accent: #0F6E56;
    --accent-bg: #E1F5EE;
    --accent-text: #085041;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    margin: 0;
    padding: 32px 16px;
    line-height: 1.5;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .subtitle { margin: 0 0 24px; font-size: 13px; color: var(--text-secondary); }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 4px; }
  .btn {
    font-size: 13px; padding: 8px 16px; border-radius: 8px;
    border: 0.5px solid var(--border-strong); background: var(--bg-card);
    cursor: pointer; color: var(--text-primary); white-space: nowrap;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn:active { transform: scale(0.98); }
  .btn-row { display: flex; gap: 8px; }
  .status-banner {
    display: none; font-size: 13px; padding: 10px 14px; border-radius: 8px;
    background: var(--accent-bg); color: var(--accent-text); margin-bottom: 20px;
  }
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card { background: var(--bg-secondary); border-radius: 8px; padding: 16px; }
  .stat-label { font-size: 13px; color: var(--text-secondary); margin: 0 0 4px; }
  .stat-value { font-size: 24px; font-weight: 600; margin: 0; }
  .stat-value.warn { color: #854F0B; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--bg-card); cursor: pointer; }
  .filter-btn.active { background: var(--bg-secondary); font-weight: 600; }
  .card-list { display: flex; flex-direction: column; gap: 12px; }
  .fund-card { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .fund-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  .fund-id { display: flex; align-items: center; gap: 10px; }
  .icon-box { min-width: 44px; height: 36px; padding: 0 6px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .fund-name { font-weight: 600; font-size: 15px; margin: 0; }
  .fund-short { font-size: 12px; color: var(--text-secondary); margin: 0; }
  .status-pill { font-size: 12px; padding: 4px 10px; border-radius: 8px; white-space: nowrap; }
  .detail-grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 10px; font-size: 13px; margin: 10px 0; }
  .detail-label { color: var(--text-secondary); margin: 0 0 2px; }
  .detail-value { margin: 0; }
  .meta-line { font-size: 13px; margin: 8px 0 0; line-height: 1.6; }
  .meta-line.muted { color: var(--text-secondary); }
  .meta-line i { font-size: 14px; vertical-align: -2px; margin-right: 5px; }
  .label-inline { color: var(--text-secondary); }
  .footnote { font-size: 12px; color: var(--text-tertiary); margin-top: 24px; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header-row">
    <div>
      <h1>Climate funds tracker</h1>
      <p class="subtitle">ASP for Climate Resilience &middot; GIZ Pakistan &middot; prototype</p>
    </div>
    <div class="btn-row">
      <button class="btn" id="scanBtn">Check for updates</button>
      <button class="btn" id="emailBtn">Copy briefing to clipboard</button>
    </div>
  </div>

  <div class="status-banner" id="scanStatus"></div>

  <div class="stats" id="statsRow">
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-filter="all">All funds</button>
    <button class="filter-btn" data-filter="urgent">Time-sensitive</button>
  </div>

  <div class="card-list" id="cardList"></div>

  <p class="footnote" id="footnote">
    All 5 fund pages checked automatically every day at 06:00 UTC via GitHub Actions.
    "Copy briefing to clipboard" copies a summary of all funds ready to paste into an email.
  </p>
</div>

<script>
const colorMap = {
  coral: { bg: '#FAECE7', text: '#712B13' },
  teal: { bg: '#E1F5EE', text: '#085041' },
  green: { bg: '#EAF3DE', text: '#27500A' },
  amber: { bg: '#FAEEDA', text: '#633806' },
  purple: { bg: '#EEEDFE', text: '#3C3489' }
};

const funds = [
  {
    id: 'frld', name: 'Fund for responding to Loss and Damage', short: 'FRLD',
    color: 'coral', icon: 'ti-alert-triangle', status: 'urgent',
    statusLabel: '9th Board meeting concluded July 2026',
    window: 'Barbados Implementation Modalities (BIM) - start-up phase',
    amount: 'USD 5M-20M per request (USD 250M total, first phase)',
    deadline: 'BIM call ran 15 Dec 2025 to 15 June 2026 (closed). 9th Board meeting concluded 8-10 July 2026 in Manila, advancing resource mobilization. Watch for approved project announcements and phase 2 call details.',
    spLink: 'Decision 1/CP.28 explicitly calls for scaling adaptive social protection. 50% floor reserved for SIDS/LDCs. SP named as eligible activity for rapid response and recovery.',
    prep: 'Check frld.org/news for the full 9th Board meeting outcomes - published July 10, 2026. Second replenishment process begins 2027. Pakistan should engage its FRLD national focal point now to position for phase 2.'
  },
  {
    id: 'gcf', name: 'Green Climate Fund', short: 'GCF',
    color: 'teal', icon: 'ti-leaf', status: 'open',
    statusLabel: 'Rolling  -  regular project cycle open',
    window: 'Regular Project Cycle + Simplified Approval Process (<=USD 25M)',
    amount: 'USD 7M readiness funding per country (4-yr cycle); projects often exceed USD 250M',
    deadline: 'Rolling submission; review + approval ~9 months',
    spLink: 'Funded LINK programme in Mozambique (USD 23.5M) linking social protection (PASP) with climate adaptation. FAO-GCF review found 23 SP-linked projects.',
    prep: 'Requires accredited entity partnership + NDA no-objection letter. Simplified Approval Process is the lower-friction entry point for first-time SP engagement.'
  },
  {
    id: 'gef', name: 'Global Environment Facility (incl. LDCF/SCCF)', short: 'GEF',
    color: 'green', icon: 'ti-world', status: 'open',
    statusLabel: 'GEF-9 now active - country programming open',
    window: 'LDCF / SCCF under GEF-9 - adaptive social protection named as core approach',
    amount: 'LDCF cap USD 20M/country; SCCF SIDS window USD 3M; GEF-9 runs July 2026-June 2030',
    deadline: 'GEF-9 adopted ~May/June 2026 and now active. Country programming discussions underway. Council meets twice yearly to approve work programmes.',
    spLink: 'GEF-9 is the first GEF strategy to explicitly name adaptive social protection as one of six adaptation approaches - cash transfers, public works, social insurance, labour market interventions.',
    prep: 'GEF-9 is now active - engage your GEF Operational Focal Point immediately to position SP proposals in the new cycle pipeline before early work programmes fill up.'
  },
  {
    id: 'af', name: 'Adaptation Fund', short: 'AF',
    color: 'amber', icon: 'ti-droplet', status: 'open',
    statusLabel: 'Rolling  -  four funding windows open',
    window: 'Action Window (up to USD 25M/country) + Locally Led Adaptation Window',
    amount: 'USD 750K-USD 25M single-country; up to USD 40M regional',
    deadline: 'Rolling, reviewed on an ongoing basis by the Board',
    spLink: '19 projects with direct SP components already funded (USD 155M portfolio). Tunisia IESS-Adapt is the flagship example  -  cash transfers aligned to national programme.',
    prep: 'No SP-specific window, but Readiness Programme grants (up to USD 250K) can fund proposal development.'
  },
  {
    id: 'cif', name: 'Climate Investment Funds', short: 'CIF',
    color: 'purple', icon: 'ti-building-bank', status: 'watch',
    statusLabel: 'ARISE EOI deadline passed - evaluation underway',
    window: 'ARISE (launched COP30) + Industry Decarbonization + Accelerating Coal Transition',
    amount: 'USD 10M-500M depending on programme; 5-10 yr duration',
    deadline: 'ARISE launched at COP30 Nov 2025. EOI deadline was 19 June 2026 (now passed). Independent expert group now evaluating submissions; selected countries invited to prepare Investment Plans.',
    spLink: 'ARISE EOI explicitly asks applicants to explain how proposals advance adaptive social protection and locally-led adaptation - strongest SP language of any CIF programme to date.',
    prep: 'EOI window has closed. If Pakistan did not submit, engage your CIF national focal point now about positioning for the next ARISE entry point or other CIF windows (Industry Decarbonization, Coal Transition).'
  }
];

let activeFilter = 'all';
let liveData = null;

async function loadLiveData() {
  try {
    const response = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
    if (response.ok) {
      liveData = await response.json();
    }
  } catch (e) {
    liveData = null;
  }
  render();
}

function liveBadgeFor(fundId) {
  if (!liveData || !liveData.funds || !liveData.funds[fundId]) return '';
  const entry = liveData.funds[fundId];
  if (entry.checkFailed) {
    return `<p class="meta-line muted" style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);">
      <span style="color:var(--text-primary);font-weight:600;">Check failed</span> - last attempted ${entry.lastChecked}. ${entry.note}
    </p>`;
  }
  const changedText = entry.changedSinceLastView
    ? '<span style="color:var(--text-primary);font-weight:600;">Page changed</span> - '
    : '';
  const contentLine = entry.latestContent
    ? `<br><span style="color:var(--text-secondary)">Latest from page:</span> ${entry.latestContent}`
    : '';
  return `<p class="meta-line muted" style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border);">
    ${changedText}Live check: ${entry.lastChecked}. ${entry.note}${contentLine}
  </p>`;
}

function renderStats() {
  const total = funds.length;
  const open = funds.filter(f => f.status === 'open').length;
  const urgent = funds.filter(f => f.status === 'urgent' || f.status === 'watch').length;
  let changed = 0;
  if (liveData && liveData.funds) {
    changed = Object.values(liveData.funds).filter(e => e.changedSinceLastView).length;
  }
  const lastChecked = (liveData && liveData.funds && liveData.funds.af)
    ? liveData.funds.af.lastChecked
    : 'not yet run';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><p class="stat-label">Funds tracked</p><p class="stat-value">${total}</p></div>
    <div class="stat-card"><p class="stat-label">Rolling windows open</p><p class="stat-value">${open}</p></div>
    <div class="stat-card"><p class="stat-label">Time-sensitive</p><p class="stat-value${urgent > 0 ? ' warn' : ''}">${urgent}</p></div>
    <div class="stat-card"><p class="stat-label">Pages changed today</p><p class="stat-value${changed > 0 ? ' warn' : ''}">${changed}</p></div>
  `;

  const checkedDate = (liveData && liveData.funds && liveData.funds.af)
    ? liveData.funds.af.lastChecked
    : null;
  const footnote = document.getElementById('footnote');
  if (checkedDate) {
    const d = new Date(checkedDate + 'T06:00:00Z');
    const formatted = d.toLocaleString('en-GB', {
      day: 'numeric', month: 'long', year: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short', timeZone: 'UTC'
    });
    footnote.innerHTML = `Last automatically checked: ${formatted}. Runs daily at 06:00 UTC via GitHub Actions. "Copy briefing to clipboard" copies a summary of all funds ready to paste into an email.`;
  }
}

function render() {
  renderStats();
  const list = document.getElementById('cardList');
  const visible = activeFilter === 'urgent'
    ? funds.filter(f => f.status === 'urgent' || f.status === 'watch')
    : funds;

  list.innerHTML = visible.map(f => {
    const c = colorMap[f.color];
    return `
    <div class="fund-card">
      <div class="fund-top">
        <div class="fund-id">
          <div class="icon-box" style="background:${c.bg};color:${c.text};font-size:12px;font-weight:600;">
            ${f.short}
          </div>
          <div>
            <p class="fund-name">${f.name}</p>
            <p class="fund-short">${f.short}</p>
          </div>
        </div>
        <span class="status-pill" style="background:${c.bg};color:${c.text}">${f.statusLabel}</span>
      </div>
      <div class="detail-grid">
        <div><p class="detail-label">Window</p><p class="detail-value">${f.window}</p></div>
        <div><p class="detail-label">Funding</p><p class="detail-value">${f.amount}</p></div>
      </div>
      <p class="meta-line"><span class="label-inline">Deadline / timing:</span> ${f.deadline}</p>
      <p class="meta-line"><span class="label-inline">SP entry point:</span> ${f.spLink}</p>
      <p class="meta-line muted">${f.prep}</p>
      ${liveBadgeFor(f.id)}
    </div>`;
  }).join('');
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('scanBtn').addEventListener('click', async () => {
  const status = document.getElementById('scanStatus');
  status.style.display = 'block';
  status.innerHTML = 'Reading latest saved check from data.json...';
  await loadLiveData();
  if (liveData && liveData.funds && liveData.funds.af) {
    const entry = liveData.funds.af;
    status.innerHTML = `Loaded. All 5 funds were last automatically checked on ${entry.lastChecked} by the scheduled GitHub Actions job (runs daily at 06:00 UTC). Fund cards below show individual check results.`;
  } else {
    status.innerHTML = 'Could not load data.json. If you just set this up, make sure the file exists in the repo root and the Action has run at least once.';
  }
});

document.getElementById('emailBtn').addEventListener('click', async () => {
  const subject = 'Climate Funds Briefing - ASP Programme Tracker';
  const lines = funds.map(f =>
    `${f.short} - ${f.statusLabel}\nWindow: ${f.window}\nFunding: ${f.amount}\nTiming: ${f.deadline}\nSP entry point: ${f.spLink}\nNext step: ${f.prep}\n`
  ).join('\n');
  const body = `${subject}\n${'='.repeat(subject.length)}\n\n${lines}\nGenerated from GIZ ASP-Climate funds tracker.`;
  try {
    await navigator.clipboard.writeText(body);
    const btn = document.getElementById('emailBtn');
    const original = btn.textContent;
    btn.textContent = 'Copied to clipboard!';
    btn.style.background = 'var(--accent-bg)';
    btn.style.color = 'var(--accent-text)';
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = '';
      btn.style.color = '';
    }, 2500);
  } catch (e) {
    alert('Could not copy automatically. Please use Ctrl+C after selecting the text.');
  }
});

loadLiveData();
</script>
</body>
</html>
