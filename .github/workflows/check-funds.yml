name: Check climate funds for updates

on:
  schedule:
    # Runs once a day at 06:00 UTC (about 11:00am Pakistan time)
    - cron: "0 6 * * *"
  workflow_dispatch:
    # This lets you trigger it manually from the GitHub Actions tab,
    # instead of waiting for the schedule. Useful for testing.

permissions:
  contents: write

jobs:
  check-for-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check the Adaptation Fund page
        run: python scrape_af.py

      - name: Check GCF, CIF, GEF, and FRLD pages
        run: python scrape_other_funds.py

      - name: Save any changes back to the repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json last_snapshot_af.txt last_snapshot_gcf.txt last_snapshot_cif.txt last_snapshot_gef.txt last_snapshot_frld.txt last_snapshot_frld_news.txt last_snapshot_frld_b9.txt
          git diff --quiet --cached || git commit -m "Automated check: all 5 climate funds"
          git push
